services:

  frontend:
    build:
      context: ./client

    container_name: mediavault-client

    ports:
      - "5173:5173"

    volumes:
      - ./client:/app
      - /app/node_modules

    command: npm run dev -- --host

    depends_on:
      - backend

  backend:
    build:
      context: ./server

    container_name: mediavault-api

    ports:
      - "3000:3000"

    volumes:
      - ./server:/app
      - /app/node_modules

    command: npm run dev
